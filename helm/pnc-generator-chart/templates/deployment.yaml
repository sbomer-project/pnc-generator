apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pnc-generator-chart.fullname" . }}
  labels:
    {{- include "pnc-generator-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pnc-generator-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pnc-generator-chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pnc-generator-chart.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # --- INJECTED APPLICATION ENVIRONMENT VARIABLES ---
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.config.kafka.bootstrapServers | quote }}
            - name: SCHEMA_REGISTRY_URL
              value: {{ .Values.config.kafka.schemaRegistryUrl | quote }}
            - name: MANIFEST_STORAGE_INTERNAL_URL
              value: {{ .Values.config.storage.internalUrl | quote }}
            - name: PNC_API_URL
              value: {{ .Values.config.pnc.apiUrl | quote }}
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.config.otel.endpoint }}
            - name: QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.config.otel.protocol }}
            - name: QUARKUS_OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=sbomer-pnc-generator"
            - name: SBOMER_GENERATOR_TOOL_NAME
              value: {{ .Values.config.sbomMetadata.toolName | quote }}
            - name: SBOMER_GENERATOR_TOOL_VERSION
              value: {{ .Values.config.sbomMetadata.toolVersion | quote }}
            - name: SBOMER_GENERATOR_SUPPLIER_NAME
              value: {{ .Values.config.sbomMetadata.supplierName | quote }}
            - name: SBOMER_GENERATOR_SUPPLIER_URLS
              value: {{ .Values.config.sbomMetadata.supplierUrls | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}